            <script>
                function checkVerb() {
                const verbList = ["ran", "walked", "went"];
                const verbVal = document.getElementById("VerbQuestion").value;
                    if(verbList.includes(verbVal)) {
                        alert("Correct! Nicely done.");
                        return true;
                        
                    }
                
                    else {

                        alert("False! Try again.");
                        return false;
                    }
                }
                function checkAdverb() {
                const adverbList = ["gently", "softly", "poorly"];
                const adverbVal = document.getElementById("AdverbQuestion").value;
                    if(adverbList.includes(adverbVal)) {
                        alert("Correct! Nicely done.");
                        return true;
                        
                    }

                        alert("False! Try again.");

                    }
